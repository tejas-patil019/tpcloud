<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Primary SEO -->
    <title>TP Cloud Technologies | Cloud, DevOps & AI Solutions</title>

    <meta
      name="description"
      content="TP Cloud Technologies provides cloud consulting, DevOps automation, cloud migration, infrastructure management, cybersecurity, AI solutions, and managed IT services for startups and enterprises."
    />

    <meta
      name="keywords"
      content="TP Cloud Technologies, cloud consulting, DevOps services, AWS consulting, Azure consulting, cloud migration, Docker, Kubernetes, Terraform, CI/CD automation, cloud security, AI solutions, managed IT services"
    />

    <meta name="author" content="TP Cloud Technologies" />

    <meta name="robots" content="index, follow" />

    <!-- Canonical Website URL -->
    <link
      rel="canonical"
      href="https://tpcloud.online/"
    />

    <!-- Open Graph SEO -->
    <meta
      property="og:title"
      content="TP Cloud Technologies | Cloud, DevOps & AI Solutions"
    />

    <meta
      property="og:description"
      content="Build, deploy, and scale with secure cloud infrastructure, DevOps automation, cloud migration, cybersecurity, and AI solutions."
    />

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:url"
      content="https://tpcloud.online/"
    />

    <meta
      property="og:site_name"
      content="TP Cloud Technologies"
    />

    <!-- Twitter/X Preview -->
    <meta
      name="twitter:card"
      content="summary"
    />

    <meta
      name="twitter:title"
      content="TP Cloud Technologies | Cloud, DevOps & AI Solutions"
    />

    <meta
      name="twitter:description"
      content="Secure and scalable cloud infrastructure, DevOps automation, cybersecurity, cloud migration, and AI solutions."
    />

    <!-- Website Theme -->
    <meta
      name="theme-color"
      content="#0758f7"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
